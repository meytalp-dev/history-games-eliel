<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ציר הזמן של מלחמות ישראל</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --bg2: #1a1545;
    --card-blue: #1e3a8a;
    --card-orange: #c2410c;
    --card-green: #166534;
    --card-purple: #6b21a8;
    --card-teal: #0f766e;
    --card-red: #991b1b;
    --accent: #facc15;
    --accent2: #f97316;
    --text: #f8fafc;
    --slot-border: rgba(250,204,21,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rubik', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(99,44,200,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(234,88,12,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(20,100,180,0.12) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
  }

  .title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    background: linear-gradient(135deg, #facc15, #f97316, #ef4444);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1.1;
    animation: titlePop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .subtitle {
    color: rgba(248,250,252,0.6);
    font-size: 1rem;
    margin-top: 6px;
  }

  @keyframes titlePop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* Score & Lives */
  .hud {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
    flex-wrap: wrap;
  }

  .hud-item {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 8px 22px;
    font-size: 0.95rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hud-item span { font-size: 1.3rem; }

  .score-val { color: var(--accent); font-size: 1.2rem; }
  .lives-val { color: #f87171; font-size: 1.2rem; }
  .streak-val { color: #86efac; font-size: 1.2rem; }

  /* Instructions */
  .instructions {
    text-align: center;
    color: rgba(248,250,252,0.65);
    font-size: 0.88rem;
    margin-bottom: 20px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* Timeline Slots */
  .timeline-section {
    margin-bottom: 28px;
  }

  .section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timeline-slots {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }

  .slot {
    height: 80px;
    border: 2px dashed var(--slot-border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: rgba(250,204,21,0.5);
    text-align: center;
    transition: all 0.2s ease;
    position: relative;
    background: rgba(250,204,21,0.03);
    cursor: pointer;
  }

  .slot-year {
    font-weight: 900;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .slot:hover, .slot.drag-over {
    border-color: var(--accent);
    background: rgba(250,204,21,0.08);
    transform: scale(1.03);
  }

  .slot.filled {
    border-style: solid;
    cursor: default;
  }

  .slot.correct {
    border-color: #4ade80;
    background: rgba(74,222,128,0.1);
    animation: correctPulse 0.5s ease;
  }

  .slot.wrong {
    border-color: #f87171;
    background: rgba(248,113,113,0.1);
    animation: shake 0.4s ease;
  }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Cards Pool */
  .cards-section {
    margin-bottom: 24px;
  }

  .cards-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    min-height: 90px;
    padding: 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .war-card {
    padding: 12px 16px;
    border-radius: 14px;
    cursor: grab;
    user-select: none;
    font-weight: 700;
    font-size: 0.82rem;
    text-align: center;
    min-width: 110px;
    max-width: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
    animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative;
    overflow: hidden;
  }

  .war-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  @keyframes cardIn {
    from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .war-card:hover {
    transform: translateY(-4px) rotate(1deg);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .war-card:active, .war-card.dragging {
    cursor: grabbing;
    transform: scale(1.05) rotate(2deg);
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    opacity: 0.9;
    z-index: 999;
  }

  .war-card .card-icon { font-size: 1.6rem; }
  .war-card .card-name { line-height: 1.2; }

  /* Card colors */
  .color-1 { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
  .color-2 { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
  .color-3 { background: linear-gradient(135deg, #14532d, #22c55e); }
  .color-4 { background: linear-gradient(135deg, #581c87, #a855f7); }
  .color-5 { background: linear-gradient(135deg, #134e4a, #14b8a6); }
  .color-6 { background: linear-gradient(135deg, #7c2d12, #f97316); }
  .color-7 { background: linear-gradient(135deg, #0c4a6e, #0ea5e9); }
  .color-8 { background: linear-gradient(135deg, #365314, #84cc16); }
  .color-9 { background: linear-gradient(135deg, #1e1b4b, #818cf8); }
  .color-10 { background: linear-gradient(135deg, #4a1942, #ec4899); }

  /* Buttons */
  .btn-group {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 16px 0;
  }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 12px 28px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .btn-check {
    background: linear-gradient(135deg, #facc15, #f97316);
    color: #1a1545;
    box-shadow: 0 4px 20px rgba(250,204,21,0.3);
  }

  .btn-check:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(250,204,21,0.4); }

  .btn-reset {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.2);
  }

  .btn-reset:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }

  .btn-hint {
    background: linear-gradient(135deg, #6b21a8, #a855f7);
    color: white;
    box-shadow: 0 4px 20px rgba(107,33,168,0.3);
  }

  .btn-hint:hover { transform: translateY(-2px); }
  .btn-hint:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Feedback Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(20,10,50,0.95);
    border-radius: 50px;
    padding: 14px 30px;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1000;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #4ade80; color: #4ade80; }
  .toast.error { border-color: #f87171; color: #f87171; }
  .toast.info { border-color: var(--accent); color: var(--accent); }

  /* Placed card in slot */
  .placed-card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    border-radius: 12px;
    padding: 4px;
    gap: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .placed-card:hover { filter: brightness(1.15); }
  .placed-card .mini-icon { font-size: 1.1rem; }

  /* Completion overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .overlay.active { display: flex; }

  .result-box {
    background: linear-gradient(135deg, #1a0a3a, #0f1e40);
    border: 2px solid rgba(250,204,21,0.4);
    border-radius: 24px;
    padding: 40px 50px;
    text-align: center;
    max-width: 420px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-emoji { font-size: 4rem; margin-bottom: 12px; display: block; }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    background: linear-gradient(135deg, #facc15, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .result-sub { color: rgba(248,250,252,0.7); font-size: 0.95rem; margin-bottom: 20px; }
  .result-score { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; }

  /* Progress bar */
  .progress-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 8px;
    margin: 10px 0 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #facc15, #f97316);
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  .hint-used {
    font-size: 0.75rem;
    color: rgba(248,250,252,0.4);
    margin-top: 4px;
  }

  /* Stars */
  .stars {
    font-size: 2rem;
    margin: 10px 0;
    letter-spacing: 4px;
  }

  /* Mobile touch target */
  @media (max-width: 600px) {
    .war-card { min-width: 90px; font-size: 0.75rem; }
    .timeline-slots { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .result-box { padding: 28px 24px; margin: 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="title">🗡️ ציר הזמן</div>
    <div class="title" style="font-size:clamp(1.4rem,4vw,2.2rem)">מלחמות ישראל</div>
    <div class="subtitle">גרור את המלחמות למקומן הנכון בציר הזמן</div>
  </header>

  <div class="hud">
    <div class="hud-item"><span>⭐</span> ניקוד: <span class="score-val" id="score">0</span></div>
    <div class="hud-item"><span>❤️</span> חיים: <span class="lives-val" id="lives">3</span></div>
    <div class="hud-item"><span>🔥</span> רצף: <span class="streak-val" id="streak">0</span></div>
  </div>

  <div class="instructions">
    🖱️ גרור כל מלחמה לשנה המתאימה בציר הזמן · לחץ על כרטיס שהנחת כדי להחזיר אותו
  </div>

  <div class="timeline-section">
    <div class="section-label">📅 ציר הזמן — גרור לכאן:</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="timeline-slots" id="timelineSlots"></div>
  </div>

  <div class="cards-section">
    <div class="section-label">🎴 המלחמות — גרור אותן:</div>
    <div class="cards-pool" id="cardsPool"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-check" onclick="checkAnswers()">✅ בדוק תשובות</button>
    <button class="btn btn-hint" id="hintBtn" onclick="useHint()">💡 רמז (3)</button>
    <button class="btn btn-reset" onclick="resetGame()">🔄 התחל מחדש</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay">
  <div class="result-box">
    <span class="result-emoji" id="resultEmoji">🏆</span>
    <div class="result-title" id="resultTitle">כל הכבוד!</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="stars" id="resultStars">⭐⭐⭐</div>
    <div class="result-score" id="resultScore">0 נקודות</div>
    <button class="btn btn-check" onclick="resetGame()">🔄 שחק שוב</button>
  </div>
</div>

<script>
const WARS = [
  { id: 'w1', name: 'מלחמת\nהעצמאות', year: 1948, icon: '🏛️', color: 'color-1',
    hint: 'נלחמה ב-1948 עם הקמת המדינה' },
  { id: 'w2', name: 'מבצע\nקדש', year: 1956, icon: '🌊', color: 'color-2',
    hint: 'מבצע בסיני ב-1956' },
  { id: 'w3', name: 'מלחמת\nששת הימים', year: 1967, icon: '✈️', color: 'color-3',
    hint: 'מלחמה שנמשכה 6 ימים ב-1967' },
  { id: 'w4', name: 'מלחמת\nההתשה', year: 1969, icon: '🔫', color: 'color-4',
    hint: 'לאחר 67, לאורך תעלת סואץ, 1969-1970' },
  { id: 'w5', name: 'מלחמת\nיום הכיפורים', year: 1973, icon: '⚔️', color: 'color-5',
    hint: 'הפתעה ב-6 באוקטובר 1973' },
  { id: 'w6', name: 'מבצע\nליטני', year: 1978, icon: '🌲', color: 'color-6',
    hint: 'מבצע בלבנון ב-1978' },
  { id: 'w7', name: 'מלחמת\nלבנון הראשונה', year: 1982, icon: '🏔️', color: 'color-7',
    hint: 'מבצע שלום הגליל ב-1982' },
  { id: 'w8', name: 'מלחמת\nלבנון השנייה', year: 2006, icon: '🚀', color: 'color-8',
    hint: 'לאחר חטיפת חיילים ב-2006' },
  { id: 'w9', name: 'מבצע\nעופרת יצוקה', year: 2008, icon: '🛡️', color: 'color-9',
    hint: 'מבצע בעזה בחורף 2008-2009' },
  { id: 'w10', name: 'מבצע\nצוק איתן', year: 2014, icon: '💥', color: 'color-10',
    hint: 'מבצע בעזה בקיץ 2014' },
];

let score = 0;
let lives = 3;
let streak = 0;
let hints = 3;
let placements = {}; // slotYear -> warId
let draggedCard = null;
let gameOver = false;

function init() {
  // Build timeline slots
  const slotsEl = document.getElementById('timelineSlots');
  slotsEl.innerHTML = '';
  WARS.forEach(w => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.year = w.year;
    slot.innerHTML = `<div class="slot-year">${w.year}</div><div style="font-size:0.65rem;opacity:0.5">גרור לכאן</div>`;
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('drag-over'); handleDrop(slot); });
    slotsEl.appendChild(slot);
  });

  // Build shuffled cards
  const pool = document.getElementById('cardsPool');
  pool.innerHTML = '';
  const shuffled = [...WARS].sort(() => Math.random() - 0.5);
  shuffled.forEach((w, i) => {
    const card = createCard(w, i);
    pool.appendChild(card);
  });

  placements = {};
  updateHUD();
  updateProgress();
}

function createCard(w, delay = 0) {
  const card = document.createElement('div');
  card.className = `war-card ${w.color}`;
  card.id = `card-${w.id}`;
  card.draggable = true;
  card.style.animationDelay = `${delay * 0.06}s`;
  card.innerHTML = `<span class="card-icon">${w.icon}</span><span class="card-name">${w.name}</span>`;
  card.dataset.warId = w.id;

  card.addEventListener('dragstart', e => {
    draggedCard = w.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  return card;
}

function handleDrop(slot) {
  if (!draggedCard || gameOver) return;
  const year = parseInt(slot.dataset.year);

  // If slot already occupied, swap back
  if (placements[year]) {
    returnCardToPool(placements[year]);
  }

  // Remove card from previous slot if it was placed
  const existingSlot = Object.entries(placements).find(([y, id]) => id === draggedCard);
  if (existingSlot) {
    const [prevYear] = existingSlot;
    delete placements[prevYear];
    resetSlotVisual(prevYear);
  }

  // Remove card from pool
  const cardEl = document.getElementById(`card-${draggedCard}`);
  if (cardEl) cardEl.remove();

  placements[year] = draggedCard;
  renderPlacedCard(slot, draggedCard);
  draggedCard = null;
  updateProgress();
}

function renderPlacedCard(slot, warId) {
  const w = WARS.find(x => x.id === warId);
  slot.innerHTML = '';
  slot.classList.add('filled');

  const placed = document.createElement('div');
  placed.className = `placed-card ${w.color}`;
  placed.innerHTML = `<span class="mini-icon">${w.icon}</span><span>${w.name}</span>`;
  placed.title = 'לחץ להחזיר לבריכה';
  placed.onclick = () => {
    returnCardToPool(warId);
    delete placements[parseInt(slot.dataset.year)];
    resetSlotVisual(slot.dataset.year);
    updateProgress();
  };
  slot.appendChild(placed);
}

function resetSlotVisual(year) {
  const slot = document.querySelector(`.slot[data-year="${year}"]`);
  if (!slot) return;
  slot.classList.remove('filled', 'correct', 'wrong');
  slot.innerHTML = `<div class="slot-year">${year}</div><div style="font-size:0.65rem;opacity:0.5">גרור לכאן</div>`;
}

function returnCardToPool(warId) {
  const w = WARS.find(x => x.id === warId);
  const pool = document.getElementById('cardsPool');
  if (!document.getElementById(`card-${warId}`)) {
    const card = createCard(w);
    pool.appendChild(card);
  }
}

function checkAnswers() {
  if (gameOver) return;
  let allPlaced = WARS.every(w => Object.values(placements).includes(w.id));
  if (!allPlaced) {
    showToast('⚠️ יש עוד מלחמות שלא הוצבו!', 'info');
    return;
  }

  let correct = 0;
  let wrong = 0;

  WARS.forEach(w => {
    const slot = document.querySelector(`.slot[data-year="${w.year}"]`);
    const placed = placements[w.year];
    if (placed === w.id) {
      correct++;
      slot.classList.add('correct');
    } else {
      wrong++;
      slot.classList.add('wrong');
    }
  });

  // Update score
  if (wrong === 0) {
    streak++;
    const bonus = streak > 1 ? ` + ${(streak-1)*20} רצף!` : '';
    score += correct * 10 + (streak - 1) * 20;
    showToast(`🎉 מושלם! ${correct}/10 נכון${bonus}`, 'success');
    setTimeout(() => showResult(correct), 1200);
  } else {
    streak = 0;
    lives--;
    score = Math.max(0, score - wrong * 5);
    showToast(`❌ ${wrong} שגיאות. נסה שוב! (-${wrong*5} נקודות)`, 'error');
    updateHUD();
    if (lives <= 0) {
      gameOver = true;
      setTimeout(() => showResult(correct), 1200);
    }
  }
  updateHUD();
}

function useHint() {
  if (hints <= 0 || gameOver) return;
  // Find a misplaced or unplaced war
  const unplaced = WARS.find(w => !Object.values(placements).includes(w.id));
  const misplaced = WARS.find(w => {
    const placed = placements[w.year];
    return placed && placed !== w.id;
  });
  const target = unplaced || misplaced;
  if (target) {
    showToast(`💡 ${target.hint}`, 'info');
    hints--;
    document.getElementById('hintBtn').textContent = `💡 רמז (${hints})`;
    if (hints <= 0) document.getElementById('hintBtn').disabled = true;
  }
}

function showResult(correct) {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');

  const pct = correct / WARS.length;
  let emoji, title, sub, stars;

  if (pct === 1) {
    emoji = '🏆'; title = 'גאון!'; sub = 'כל המלחמות במקום הנכון!';
    stars = '⭐⭐⭐';
  } else if (pct >= 0.7) {
    emoji = '😎'; title = 'כל הכבוד!'; sub = `${correct} מתוך ${WARS.length} נכון`;
    stars = '⭐⭐';
  } else {
    emoji = '📚'; title = 'כמעט!'; sub = `${correct} מתוך ${WARS.length}. אפשר טוב יותר!`;
    stars = '⭐';
  }

  if (lives <= 0 && pct < 1) {
    emoji = '💔'; title = 'נגמרו החיים'; sub = `סיימת עם ${correct}/${WARS.length}`;
    stars = '';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultScore').textContent = `${score} נקודות`;
}

function resetGame() {
  score = 0; lives = 3; streak = 0; hints = 3; gameOver = false;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('hintBtn').textContent = '💡 רמז (3)';
  document.getElementById('hintBtn').disabled = false;
  // Remove correct/wrong classes
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('correct', 'wrong'));
  updateHUD();
  init();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(lives) || '💀';
  document.getElementById('streak').textContent = streak;
}

function updateProgress() {
  const placed = Object.keys(placements).length;
  const pct = (placed / WARS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Init on load
init();
</script>
</body>
</html>
