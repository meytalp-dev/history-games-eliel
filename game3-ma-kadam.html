<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מה קדם למה?</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111827;
  --surface: #1f2937;
  --surface2: #374151;
  --blue: #3b82f6;
  --orange: #f97316;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #fbbf24;
  --text: #f9fafb;
  --muted: rgba(249,250,251,0.45);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Grid BG */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 720px;
  padding: 20px 16px;
}

header {
  text-align: center;
  padding: 16px 0 24px;
}

.badge {
  display: inline-block;
  border: 1px solid var(--blue);
  color: var(--blue);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 3px;
  padding: 3px 12px;
  border-radius: 4px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 9vw, 5rem);
  letter-spacing: 2px;
  line-height: 1;
  background: linear-gradient(135deg, var(--blue), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  color: var(--muted);
  font-size: 0.85rem;
  margin-top: 6px;
}

/* HUD */
.hud {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}

.hud-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
}

.hud-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 1px;
  line-height: 1;
  color: var(--gold);
}

.hud-val.correct { color: var(--green); }
.hud-val.wrong { color: var(--red); }
.hud-val.streak { color: var(--orange); }

.hud-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}

/* Question */
.question-prompt {
  text-align: center;
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

.question-prompt strong { color: var(--gold); }

/* VS Arena */
.arena {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
}

.war-btn {
  background: var(--surface);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 28px 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  min-height: 160px;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.war-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}

.war-btn:hover:not(:disabled) {
  border-color: var(--blue);
  transform: scale(1.03);
  box-shadow: 0 0 30px rgba(59,130,246,0.2);
}

.war-btn:hover:not(:disabled)::before { opacity: 1; background: radial-gradient(circle at center, rgba(59,130,246,0.1), transparent 70%); }

.war-btn.correct-ans {
  border-color: var(--green);
  background: rgba(34,197,94,0.08);
  box-shadow: 0 0 30px rgba(34,197,94,0.25);
  animation: correctFlash 0.5s ease;
}

.war-btn.wrong-ans {
  border-color: var(--red);
  background: rgba(239,68,68,0.08);
  animation: shake 0.35s ease;
}

@keyframes correctFlash {
  0%,100% { transform: scale(1); }
  40% { transform: scale(1.06); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

.war-btn:disabled { cursor: default; }

.btn-icon { font-size: 2.5rem; }
.btn-name {
  font-weight: 800;
  font-size: clamp(0.9rem, 2.5vw, 1.05rem);
  line-height: 1.3;
  color: var(--text);
}

.year-reveal {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.4s ease;
  margin-top: 2px;
}

.year-reveal.show { opacity: 1; }

.year-reveal.correct-year { color: var(--green); }
.year-reveal.wrong-year { color: var(--red); }

.vs-circle {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 2px;
  color: var(--gold);
  flex-shrink: 0;
  border: 2px solid rgba(251,191,36,0.3);
  box-shadow: 0 0 20px rgba(251,191,36,0.1);
}

/* Feedback */
.feedback-bar {
  text-align: center;
  padding: 14px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 16px;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.3s ease;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--muted);
}

.feedback-bar.success { background: rgba(34,197,94,0.1); border-color: var(--green); color: var(--green); }
.feedback-bar.fail { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

/* Progress */
.progress-section {
  margin-bottom: 20px;
}

.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 50px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--orange));
  border-radius: 50px;
  transition: width 0.4s ease;
}

.progress-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* Next btn */
.next-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--blue), #2563eb);
  border: none;
  border-radius: 14px;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
  box-shadow: 0 4px 20px rgba(59,130,246,0.3);
}

.next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.4); }
.next-btn.show { display: block; }

/* Streak badge */
.streak-badge {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: linear-gradient(135deg, var(--orange), #dc2626);
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 2px;
  padding: 10px 28px;
  border-radius: 50px;
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  box-shadow: 0 8px 30px rgba(249,115,22,0.4);
}

.streak-badge.show { transform: translateX(-50%) translateY(0); }

/* Overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
}
.overlay.active { display: flex; }

.result-box {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 44px 40px;
  text-align: center;
  max-width: 400px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

@keyframes popIn {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.result-emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
.result-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 2px; color: var(--gold); margin-bottom: 4px; }
.result-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
.result-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.stat-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 1px; }
.stat-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

.btn-play-again {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--blue), #1d4ed8);
  border: none;
  border-radius: 12px;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-play-again:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }

@media (max-width: 480px) {
  .arena { grid-template-columns: 1fr; }
  .vs-circle { display: none; }
  .war-btn { min-height: 120px; }
  .result-box { padding: 28px 20px; margin: 16px; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">משחק 3</div>
    <div class="title">מה קדם למה?</div>
    <div class="subtitle">לחץ על המלחמה שהייתה ראשונה!</div>
  </header>

  <div class="hud">
    <div class="hud-box"><div class="hud-val" id="score">0</div><div class="hud-label">ניקוד</div></div>
    <div class="hud-box"><div class="hud-val correct" id="correctCount">0</div><div class="hud-label">נכון ✓</div></div>
    <div class="hud-box"><div class="hud-val wrong" id="wrongCount">0</div><div class="hud-label">טעות ✗</div></div>
    <div class="hud-box"><div class="hud-val streak" id="streak">0</div><div class="hud-label">רצף 🔥</div></div>
  </div>

  <div class="progress-section">
    <div class="progress-label" id="progressLabel">שאלה 1 מתוך 15</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="question-prompt">⚔️ <strong>איזו מלחמה הייתה קודם?</strong></div>

  <div class="arena">
    <button class="war-btn" id="btnA" onclick="choose(0)">
      <span class="btn-icon" id="iconA">⚔️</span>
      <span class="btn-name" id="nameA">—</span>
      <span class="year-reveal" id="yearA">—</span>
    </button>
    <div class="vs-circle">VS</div>
    <button class="war-btn" id="btnB" onclick="choose(1)">
      <span class="btn-icon" id="iconB">⚔️</span>
      <span class="btn-name" id="nameB">—</span>
      <span class="year-reveal" id="yearB">—</span>
    </button>
  </div>

  <div class="feedback-bar" id="feedback">לחץ על המלחמה שהתרחשה קודם</div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">הבא ←</button>
</div>

<div class="streak-badge" id="streakBadge">🔥 רצף!</div>

<div class="overlay" id="overlay">
  <div class="result-box">
    <span class="result-emoji" id="rEmoji">🏆</span>
    <div class="result-title" id="rTitle">כל הכבוד!</div>
    <div class="result-sub" id="rSub">סיימת את המשחק</div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-num" style="color:var(--gold)" id="rScore">0</div><div class="stat-label">ניקוד סופי</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green)" id="rCorrect">0</div><div class="stat-label">תשובות נכונות</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--orange)" id="rStreak">0</div><div class="stat-label">רצף מקסימלי</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--blue)" id="rAcc">0%</div><div class="stat-label">דיוק</div></div>
    </div>
    <button class="btn-play-again" onclick="startGame()">🔄 שחק שוב</button>
  </div>
</div>

<script>
const WARS = [
  { name: 'מלחמת העצמאות', year: 1948, icon: '🏛️' },
  { name: 'מבצע קדש', year: 1956, icon: '🌊' },
  { name: 'מלחמת ששת הימים', year: 1967, icon: '✈️' },
  { name: 'מלחמת ההתשה', year: 1969, icon: '🔫' },
  { name: 'מלחמת יום הכיפורים', year: 1973, icon: '⚔️' },
  { name: 'מבצע ליטני', year: 1978, icon: '🌲' },
  { name: 'מלחמת לבנון הראשונה', year: 1982, icon: '🏔️' },
  { name: 'מלחמת לבנון השנייה', year: 2006, icon: '🚀' },
  { name: 'מבצע עופרת יצוקה', year: 2008, icon: '🛡️' },
  { name: 'מבצע צוק איתן', year: 2014, icon: '💥' },
];

const TOTAL_Q = 15;
let questions = [];
let current = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let streak = 0;
let maxStreak = 0;
let answered = false;

function generateQuestions() {
  const qs = [];
  for (let i = 0; i < TOTAL_Q; i++) {
    let a, b;
    do {
      a = WARS[Math.floor(Math.random() * WARS.length)];
      b = WARS[Math.floor(Math.random() * WARS.length)];
    } while (a === b);
    qs.push({ a, b, correct: a.year < b.year ? 0 : 1 });
  }
  return qs;
}

function startGame() {
  questions = generateQuestions();
  current = 0; score = 0; correctCount = 0; wrongCount = 0; streak = 0; maxStreak = 0;
  document.getElementById('overlay').classList.remove('active');
  loadQ();
}

function loadQ() {
  if (current >= TOTAL_Q) { showResult(); return; }
  const q = questions[current];
  answered = false;

  ['btnA','btnB'].forEach((id, i) => {
    const btn = document.getElementById(id);
    const war = i === 0 ? q.a : q.b;
    btn.className = 'war-btn';
    btn.disabled = false;
    document.getElementById(i===0?'iconA':'iconB').textContent = war.icon;
    document.getElementById(i===0?'nameA':'nameB').textContent = war.name;
    const yearEl = document.getElementById(i===0?'yearA':'yearB');
    yearEl.textContent = war.year;
    yearEl.className = 'year-reveal';
  });

  document.getElementById('feedback').textContent = 'לחץ על המלחמה שהתרחשה קודם';
  document.getElementById('feedback').className = 'feedback-bar';
  document.getElementById('nextBtn').className = 'next-btn';

  updateHUD();
  document.getElementById('progressFill').style.width = (current / TOTAL_Q * 100) + '%';
  document.getElementById('progressLabel').textContent = `שאלה ${current + 1} מתוך ${TOTAL_Q}`;
}

function choose(idx) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btnA = document.getElementById('btnA');
  const btnB = document.getElementById('btnB');
  [btnA, btnB].forEach(b => b.disabled = true);

  // Reveal years
  document.getElementById('yearA').classList.add('show');
  document.getElementById('yearB').classList.add('show');

  const correctIdx = q.correct;
  const isCorrect = idx === correctIdx;

  // Style years
  ['yearA','yearB'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.add(i === correctIdx ? 'correct-year' : 'wrong-year');
  });

  const chosenBtn = idx === 0 ? btnA : btnB;
  const otherBtn = idx === 0 ? btnB : btnA;

  if (isCorrect) {
    chosenBtn.classList.add('correct-ans');
    score += 10 + Math.min(streak * 5, 20);
    correctCount++;
    streak++;
    maxStreak = Math.max(maxStreak, streak);
    document.getElementById('feedback').className = 'feedback-bar success';
    document.getElementById('feedback').textContent = `✅ נכון! ${q.a.name} (${q.a.year}) הייתה לפני ${q.b.name} (${q.b.year})`;
    if (streak >= 3) showStreakBadge();
  } else {
    chosenBtn.classList.add('wrong-ans');
    otherBtn.classList.add('correct-ans');
    wrongCount++;
    streak = 0;
    const earlier = q.correct === 0 ? q.a : q.b;
    document.getElementById('feedback').className = 'feedback-bar fail';
    document.getElementById('feedback').textContent = `❌ טעות! ${earlier.name} (${earlier.year}) הייתה קודם`;
  }

  updateHUD();
  document.getElementById('nextBtn').className = 'next-btn show';
}

function showStreakBadge() {
  const badge = document.getElementById('streakBadge');
  badge.textContent = `🔥 רצף של ${streak}!`;
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 2000);
}

function nextQ() { current++; loadQ(); }

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('streak').textContent = streak;
}

function showResult() {
  const pct = correctCount / TOTAL_Q;
  let emoji, title;
  if (pct === 1) { emoji = '🏆'; title = 'מושלם!'; }
  else if (pct >= 0.8) { emoji = '⭐'; title = 'מצוין!'; }
  else if (pct >= 0.6) { emoji = '👍'; title = 'לא רע!'; }
  else { emoji = '📚'; title = 'תנסה שוב!'; }

  document.getElementById('rEmoji').textContent = emoji;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rSub').textContent = `${correctCount} מתוך ${TOTAL_Q} נכון`;
  document.getElementById('rScore').textContent = score;
  document.getElementById('rCorrect').textContent = correctCount;
  document.getElementById('rStreak').textContent = maxStreak;
  document.getElementById('rAcc').textContent = Math.round(pct * 100) + '%';
  document.getElementById('overlay').classList.add('active');
}

startGame();
</script>
</body>
</html>
